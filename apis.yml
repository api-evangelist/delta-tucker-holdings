description: >-
  Delta Tucker Holdings was the holding company for DynCorp International, a
  provider of specialized mission-critical professional and support services
  to government and commercial customers, including aviation services,
  logistics, and training. DynCorp's operations were acquired and integrated
  into Amentum in 2020. Delta Tucker Holdings does not publish public APIs;
  this profile is preserved as a corporate-history index.
